name: Build and Release

on:
  push:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get commit count and date
        id: vars
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE=$(date +%Y%m%d)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Rename JAR files
        run: |
          mkdir -p release
          COMMIT_COUNT=${{ steps.vars.outputs.commit_count }}
          DATE=${{ steps.vars.outputs.date }}
          
          FABRIC_JAR=$(find fabric/build/libs -name "*-fabric-*.jar" ! -name "*-dev-shadow*" ! -name "*-sources*" | head -1)
          NEOFORGE_JAR=$(find neoforge/build/libs -name "*-neoforge-*.jar" ! -name "*-dev-shadow*" ! -name "*-sources*" | head -1)
          
          if [ -n "$FABRIC_JAR" ]; then
            cp "$FABRIC_JAR" "release/dmodfix-dev${COMMIT_COUNT}-${DATE}-fabric.jar"
          fi
          
          if [ -n "$NEOFORGE_JAR" ]; then
            cp "$NEOFORGE_JAR" "release/dmodfix-dev${COMMIT_COUNT}-${DATE}-neoforge.jar"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmodfix-dev${{ steps.vars.outputs.commit_count }}-${{ steps.vars.outputs.date }}
          path: release/*.jar

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev${{ steps.vars.outputs.commit_count }}
          name: "Build ${{ steps.vars.outputs.commit_count }} (${{ steps.vars.outputs.date }})"
          files: release/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
